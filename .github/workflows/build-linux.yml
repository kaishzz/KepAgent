name: Build Linux amd64

on:
  push:
    branches: ["main"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version string embedded into the binary"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_SHA::12}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/kaishzz/kepagent/internal/version.Version=${VERSION}" \
            -o kepagent-linux-amd64 \
            ./cmd/kepagent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kepagent-linux-amd64
          path: kepagent-linux-amd64

      - name: Upload binary to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" kepagent-linux-amd64 --repo "${{ github.repository }}" --clobber
