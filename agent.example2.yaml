# Copy this file to agent.yaml, then configure your node-specific settings.
# Sensitive values are loaded from .env.
api_base_url: "${KEPAGENT_API_BASE_URL}"
api_key: "${KEPAGENT_API_KEY}"
poll_interval_seconds: 1
heartbeat_interval_seconds: 1
request_timeout_seconds: 15
batch_start_interval_seconds: "${KEPAGENT_BATCH_START_INTERVAL_SECONDS:-15}"
docker_base_url: null
group_labels:
  2201: "攀岩服"
  2301: "滑翔服"
group_order: ["2201", "2301"]
server_query_enabled: true
server_query_host: "127.0.0.1"
server_query_timeout_seconds: 2
server_query_cache_ttl_seconds: 1
rcon_host: "127.0.0.1"
rcon_timeout_seconds: 5
steamcmd_sh: "/data/steamcmd/steamcmd.sh"
cs2_root: "/data/cs2"
app_id: 730
# Single-profile fallback used only when monitor_profiles is empty.
monitor_server_key: "2201-1"
monitor_poll_interval_seconds: 5
monitor_stable_seconds: 120
monitor_recover_timeout_seconds: 120
monitor_restart_threshold: 2
# Mode-scoped crash checks. Each profile checks one monitor server and starts only its own configured servers after success.
monitor_profiles:
  - key: "2201"
    monitor_server_key: "2201-1"
    # Servers started only after this profile passes crash check.
    start_server_keys:
      - "2201-1"
      - "2201-2"
      - "2201-3"
      - "2201-4"
  - key: "2301"
    monitor_server_key: "2301-1"
    # Servers started only after this profile passes crash check.
    start_server_keys:
      - "2301-1"
      - "2301-2"
      - "2301-3"
      - "2301-4"

servers:
  - key: "2201-1"
    container_name: ""
    slot: 1
    image: "steamrt3:latest"
    groups: ["2201"]
    start_after_monitor: true
    entrypoint: ["/entrypoint.sh"]
    stdin_open: true
    tty: true
    working_dir: null
    network_mode: null
    command:
      - "bash"
      - "-lc"
      - "cd /cs2/game/bin/linuxsteamrt64 && exec ./cs2 -dedicated -console -high -maxplayers 20 +game_type 0 +game_mode 0 +map de_dust2 -port 28010 -ip 0.0.0.0 -disable_workshop_command_filtering +host_workshop_collection 3716869530 +exec kepcs_2201_1.cfg"
    env:
      TZ: "Asia/Shanghai"
    ports:
      - host_port: 28010
        container_port: 28010
        protocol: "tcp"
      - host_port: 28010
        container_port: 28010
        protocol: "udp"
    volumes:
      - host_path: "/data/steamcmd"
        container_path: "/steamcmd"
        mode: "rw"
      - host_path: "/data/cs2"
        container_path: "/cs2"
        mode: "rw"
      - host_path: "/data/cs2/entrypoint.sh"
        container_path: "/entrypoint.sh"
        mode: "rw"
      - host_path: "/usr/lib/x86_64-linux-gnu/libmariadb3/plugin"
        container_path: "/usr/lib/x86_64-linux-gnu/libmariadb3/plugin"
        mode: "rw"
      - host_path: "/data/cs2-mode/kz/addons"
        container_path: "/cs2/game/csgo/addons"
        mode: "rw"
      - host_path: "/data/cs2-mode/kz/cfg/multiaddonmanager"
        container_path: "/cs2/game/csgo/cfg/multiaddonmanager"
        mode: "rw"
      - host_path: "/data/cs2-mode/kz/cfg/kz-1/cs2kz-server-config.txt"
        container_path: "/cs2/game/csgo/cfg/cs2kz-server-config.txt"
        mode: "rw"
    labels:
      kepcs.mod: "2201"
      kepcs.server_key: "2201-1"
      kepcs.exec_cfg: "kepcs_2201_1.cfg"
    restart_policy: "unless-stopped"

