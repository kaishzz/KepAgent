# Copy this file to agent.yaml, then configure your node-specific settings.
# Sensitive values are loaded from .env.
api_base_url: "${KEPAGENT_API_BASE_URL}"
api_key: "${KEPAGENT_API_KEY}"
poll_interval_seconds: 3
heartbeat_interval_seconds: 5
request_timeout_seconds: 15
docker_base_url: null
group_labels:
  all: "全部"
  ze_xl: "训练服"
  ze_pt: "跑图服"
  test: "测试服"
group_order: ["all", "ze_xl", "ze_pt", "test"]
rcon_host: "127.0.0.1"
# Optional global fallback. KepCs console manual RCON usually sends per-server passwords in command payloads.
rcon_password: "${KEPAGENT_RCON_PASSWORD:-}"
rcon_timeout_seconds: 5
steamcmd_sh: "/data/steamcmd/steamcmd.sh"
cs2_root: "/data/cs2"
app_id: 730
# Default fallback used when the control plane command payload does not specify monitorServerKey.
monitor_server_key: "ze_pt_test"
monitor_poll_interval_seconds: 5
monitor_stable_seconds: 120
monitor_recover_timeout_seconds: 120
monitor_restart_threshold: 2

servers:
  - key: "ze_xl_1"
    container_name: "kepcs-ze-xl-28010"
    image: "steamrt3:latest"
    groups: ["all", "ze_xl"]
    # Optional per-server fallback when the command payload does not carry a password.
    # rcon_password: ""
    entrypoint: ["/entrypoint.sh"]
    stdin_open: true
    tty: true
    command:
      - "bash"
      - "-lc"
      - "cd /cs2/game/bin/linuxsteamrt64 && exec ./cs2 -dedicated -console -high -maxplayers 64 +game_type 0 +game_mode 0 +map de_dust2 -port 28010 -ip 0.0.0.0 -disable_workshop_command_filtering +host_workshop_collection 3292908214 +exec z_xl_1.cfg"
    env:
      TZ: "Asia/Shanghai"
    ports:
      - host_port: 28010
        container_port: 28010
        protocol: "tcp"
      - host_port: 28010
        container_port: 28010
        protocol: "udp"
    volumes:
      - host_path: "/data/steamcmd"
        container_path: "/steamcmd"
        mode: "rw"
      - host_path: "/data/cs2"
        container_path: "/cs2"
        mode: "rw"
      - host_path: "/data/cs2/entrypoint.sh"
        container_path: "/entrypoint.sh"
        mode: "rw"
    labels:
      kepcs.mode: "ze_xl"
      kepcs.server_key: "ze_xl_1"
      kepcs.exec_cfg: "z_xl_1.cfg"
    restart_policy: "unless-stopped"

